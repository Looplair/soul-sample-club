<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Vault — v3</title>
<script src="/helper.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    padding: 32px 24px 80px;
    max-width: 860px;
    margin: 0 auto;
  }

  h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #555; font-size: 13px; margin-bottom: 32px; }

  /* ── PAGE HEADER ── */
  .vault-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid #2A2A2A;
  }
  .vault-headline { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
  .vault-sub { font-size: 13px; color: #555; margin-top: 4px; }
  .vault-count { font-size: 13px; color: #444; }

  /* ── GRID ── */
  .vault-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 10px;
  }

  /* ── CARD ── */
  .drum-card {
    background: #1A1A1A;
    border: 1px solid #272727;
    border-radius: 14px;
    padding: 16px 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .drum-card:hover { border-color: #3A3A3A; transform: translateY(-1px); }

  .card-name {
    font-size: 13px; font-weight: 600; color: #e5e5e5;
    line-height: 1.3; flex: 1;
  }

  .bpm-badge {
    font-size: 11px; font-weight: 500; color: #4A4A4A;
    letter-spacing: 0.04em;
    margin-top: -4px;
  }

  /* ── WAVEFORM — monochrome, site-accurate ── */
  .waveform {
    height: 36px;
    display: flex;
    align-items: center;
    gap: 1.5px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
  }
  .waveform .bar {
    flex-shrink: 0;
    width: 2px;
    border-radius: 1px;
    background: #3A3A3A;
    transition: background 0.1s;
  }
  /* played portion — white */
  .waveform .bar.played {
    background: #FFFFFF;
  }
  /* playhead glow */
  .waveform .bar.head {
    background: #FFFFFF;
    box-shadow: 0 0 4px rgba(255,255,255,0.6);
  }

  /* playing state — animates a pulse on bars */
  .drum-card.playing .waveform .bar {
    animation: wf-pulse 0.4s ease-in-out infinite alternate;
  }
  .drum-card.playing .waveform .bar:nth-child(odd)  { animation-delay: 0s; }
  .drum-card.playing .waveform .bar:nth-child(even) { animation-delay: 0.2s; }
  @keyframes wf-pulse {
    from { opacity: 0.5; }
    to   { opacity: 1; }
  }

  /* play button overlay */
  .play-row {
    display: flex; align-items: center; gap: 8px;
  }
  .play-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid #3A3A3A; background: #222;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: border-color 0.15s, background 0.15s;
  }
  .play-btn:hover { border-color: #fff; background: #2e2e2e; }
  .play-icon { width: 0; height: 0; border-style: solid; border-width: 4px 0 4px 8px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
  .pause-icon { display: flex; gap: 2px; }
  .pause-bar { width: 2px; height: 8px; background: #fff; border-radius: 1px; }
  .drum-card.playing .play-btn { border-color: #fff; background: #2A2A2A; }

  /* ── COLLECT BUTTON ── */
  .collect-btn {
    width: 100%; padding: 8px 0;
    border-radius: 8px;
    border: 1px solid #2E2E2E;
    background: transparent;
    color: #888;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .collect-btn:hover { background: #fff; color: #111; border-color: #fff; }

  /* collected state */
  .drum-card.collected .collect-btn {
    background: transparent;
    border-color: #22c55e30;
    color: #22c55e;
    cursor: default;
    pointer-events: none;
  }
  .drum-card.collected { border-color: #22c55e20; }

  /* collect flash */
  .collect-flash {
    position: absolute; inset: 0; border-radius: 14px;
    background: radial-gradient(circle at 50% 70%, rgba(255,255,255,0.12) 0%, transparent 70%);
    pointer-events: none; opacity: 0; transition: opacity 0.35s;
  }
  .drum-card.flash .collect-flash { opacity: 1; }

  /* ── note ── */
  .note { font-size: 12px; color: #444; margin-top: 24px; text-align: center; }
</style>
</head>
<body>

<h2>The Vault — v3</h2>
<p class="subtitle">Monochrome waveform, no categories, drum loops only. Click ▶ to preview. Click Collect to see feedback.</p>

<div class="vault-header">
  <div>
    <div class="vault-headline">Drum Vault</div>
    <div class="vault-sub">Members-only drum loops — yours to keep</div>
  </div>
  <div class="vault-count">47 loops · 12 collected</div>
</div>

<div class="vault-grid" id="grid"></div>

<p class="note">↑ Click the waveform or ▶ to preview · click Collect to download</p>

<script>
const loops = [
  { id:'c1', name:'Drum Loop 01', bpm:140 },
  { id:'c2', name:'Drum Loop 02', bpm:90  },
  { id:'c3', name:'Drum Loop 03', bpm:120 },
  { id:'c4', name:'Drum Loop 04', bpm:140 },
  { id:'c5', name:'Drum Loop 05', bpm:100 },
  { id:'c6', name:'Drum Loop 06', bpm:95, collected: true },
  { id:'c7', name:'Drum Loop 07', bpm:130 },
  { id:'c8', name:'Drum Loop 08', bpm:110, collected: true },
];

// Waveform shape generators
function loopShape(seed, i, n) {
  // pseudo-random but deterministic per seed
  const r = () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; };
  // mix of transient hits and sustained energy
  const base = 0.2 + r() * 0.3;
  const spike = r() > 0.75 ? 0.5 + r() * 0.5 : 0;
  return base + spike;
}

function buildWaveform(cardEl, seed) {
  const wf = cardEl.querySelector('.waveform');
  const count = 46;
  const heights = [];
  for (let i = 0; i < count; i++) {
    const h = loopShape(seed + i * 7, i, count);
    heights.push(h);
  }
  // normalize
  const max = Math.max(...heights);
  heights.forEach((h, i) => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = Math.max(3, Math.round((h / max) * 34)) + 'px';
    wf.appendChild(bar);
  });
}

let currentlyPlaying = null;
let playTimer = null;

function togglePlay(cardId) {
  const card = document.getElementById(cardId);
  if (currentlyPlaying && currentlyPlaying !== cardId) {
    stopCard(currentlyPlaying);
  }
  if (currentlyPlaying === cardId) {
    stopCard(cardId);
    return;
  }
  // start playing
  currentlyPlaying = cardId;
  card.classList.add('playing');
  updatePlayBtn(card, true);

  // simulate playhead moving
  const bars = card.querySelectorAll('.waveform .bar');
  let idx = 0;
  clearInterval(playTimer);
  playTimer = setInterval(() => {
    if (idx > 0) bars[idx-1].classList.remove('head');
    if (idx < bars.length) {
      bars[idx].classList.add('played', 'head');
      idx++;
    } else {
      stopCard(cardId);
    }
  }, 60);
}

function stopCard(cardId) {
  const card = document.getElementById(cardId);
  clearInterval(playTimer);
  card.classList.remove('playing');
  updatePlayBtn(card, false);
  card.querySelectorAll('.bar').forEach(b => b.classList.remove('played','head'));
  if (currentlyPlaying === cardId) currentlyPlaying = null;
}

function updatePlayBtn(card, playing) {
  const btn = card.querySelector('.play-btn');
  btn.innerHTML = playing
    ? '<div class="pause-icon"><div class="pause-bar"></div><div class="pause-bar"></div></div>'
    : '<div class="play-icon"></div>';
}

function collectCard(cardId) {
  const card = document.getElementById(cardId);
  if (card.classList.contains('collected')) return;

  // stop playing if active
  if (currentlyPlaying === cardId) stopCard(cardId);

  // flash
  card.classList.add('flash');
  setTimeout(() => card.classList.remove('flash'), 500);

  // collected state
  setTimeout(() => {
    card.classList.add('collected');
    const btn = card.querySelector('.collect-btn');
    btn.innerHTML = '✓ Collected';
  }, 320);
}

// Build cards
const grid = document.getElementById('grid');
loops.forEach((loop, idx) => {
  const card = document.createElement('div');
  card.className = 'drum-card' + (loop.collected ? ' collected' : '');
  card.id = loop.id;
  card.innerHTML = `
    <div class="collect-flash"></div>
    <div class="card-name">${loop.name}</div>
    <div class="bpm-badge">${loop.bpm} BPM</div>
    <div class="play-row">
      <div class="play-btn" onclick="togglePlay('${loop.id}')"><div class="play-icon"></div></div>
      <div class="waveform" onclick="togglePlay('${loop.id}')"></div>
    </div>
    <button class="collect-btn" onclick="collectCard('${loop.id}')">
      ${loop.collected ? '✓ Collected' : 'Collect'}
    </button>
  `;
  grid.appendChild(card);
  buildWaveform(card, (idx + 1) * 9973);
});
</script>

</body>
</html>
